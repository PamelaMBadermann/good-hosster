<mat-toolbar class="header">
    <h1 class="h1-color h1 fw-bold">Good Host</h1>
    <mat-form-field>
      <mat-label>Praça/Setor</mat-label>
      <mat-select (selectionChange)="onSelectionChange($event.value)">
        <mat-option *ngFor="let section of sections()" [value]="section.name">
          {{ section.name }}
        </mat-option>
      </mat-select>
    </mat-form-field>
    <mat-label class="h5">  {{ availableCount() }} mesas disponíveis </mat-label>
  </mat-toolbar>
