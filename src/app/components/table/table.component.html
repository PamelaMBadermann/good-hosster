<mat-card appearance="raised" class="justify-content-center align-items-center"
    [ngClass]="{
        'vertical': table.direction === 'vertical',
        'horizontal': table.direction === 'horizontal',
        'available': table.available,
        'busy': !table.available
    }">
    <mat-card-content class="h5 fw-bold">Mesa {{table.id}}</mat-card-content>
    <mat-card-content>{{table.pax}} pax</mat-card-content>
    <button mat-raised-button class="w-50 m-1">Virar</button>
</mat-card>
